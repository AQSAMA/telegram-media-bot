version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      BOT_API_URL: http://127.0.0.1:7860/bot
      BOT_API_FILE_URL: http://127.0.0.1:7860/file/bot
    ports:
      - "7860:7860"
    volumes:
      - ./downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt:ro
      - bot-api-data:/app/telegram-bot-api-data
      - bot-api-temp:/app/telegram-bot-api-temp
    restart: unless-stopped

volumes:
  bot-api-data:
  bot-api-temp:
